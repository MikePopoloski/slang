name: docs
description: Build and deploy documentation (both C++/slang and Python/pyslang)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        fetch-depth: 0
    - name: Install dependencies
      run: |
        pip install jinja2 pygments docutils
        sudo apt-get install -y graphviz
        wget --quiet https://sourceforge.net/projects/doxygen/files/rel-1.16.1/doxygen-1.16.1.linux.bin.tar.gz
        tar -xf doxygen-1.16.1.linux.bin.tar.gz
        cp doxygen-1.16.1/bin/doxygen /usr/local/bin
    - name: Build docs
      run: |
        cmake -B build -DSLANG_INCLUDE_DOCS=ON -DSLANG_INCLUDE_TESTS=OFF
        cmake --build build --target docs -j8
    - name: Compress docs artifacts
      run: |
        tar -czvf slang.tar.gz build/docs build/bin/slang
    - name: Upload artifact for preview
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: slang-docs
        path: slang.tar.gz
        retention-days: 4
    - name: Upload
      if: github.event_name != 'pull_request' && github.repository == 'MikePopoloski/slang'
      uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1
      with:
        host: ${{ secrets.SSH_DEPLOY_HOST }}
        username: ${{ secrets.SSH_DEPLOY_USERNAME }}
        port: ${{ secrets.SSH_DEPLOY_PORT }}
        key: ${{ secrets.SSH_DEPLOY_KEY }}
        passphrase: ${{ secrets.SSH_DEPLOY_PASSPHRASE }}
        source: slang.tar.gz
        target: upload/
    - name: Deploy
      if: github.event_name != 'pull_request' && github.repository == 'MikePopoloski/slang'
      uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
      with:
        host: ${{ secrets.SSH_DEPLOY_HOST }}
        username: ${{ secrets.SSH_DEPLOY_USERNAME }}
        port: ${{ secrets.SSH_DEPLOY_PORT }}
        key: ${{ secrets.SSH_DEPLOY_KEY }}
        passphrase: ${{ secrets.SSH_DEPLOY_PASSPHRASE }}
        script: slang-website/deploy_docs.sh
