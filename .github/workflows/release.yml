name: Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  linux:
    name: Linux (x86_64, manylinux_2_28)
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build
        run: |
          git config --system --add safe.directory '*'
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-static-libgcc -static-libstdc++" \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=TRUE \
            -DSLANG_INCLUDE_TESTS=OFF
          cmake --build build -j8
      - name: Package
        run: |
          mkdir -p dist
          tar -czvf dist/slang-linux-x86_64.tar.gz -C build/bin slang
      - uses: actions/upload-artifact@v7
        with:
          name: artifact-linux
          path: dist/slang-linux-x86_64.tar.gz

  macos:
    name: macOS (arm64)
    runs-on: macos-latest
    environment: release-macos
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=TRUE \
            -DSLANG_INCLUDE_TESTS=OFF
          cmake --build build -j8
      - name: Code sign and notarize
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_NOTARIZATION_API_KEY: ${{ secrets.MACOS_NOTARIZATION_API_KEY }}
          MACOS_NOTARIZATION_API_KEY_ID: ${{ secrets.MACOS_NOTARIZATION_API_KEY_ID }}
          MACOS_NOTARIZATION_API_ISSUER_ID: ${{ secrets.MACOS_NOTARIZATION_API_ISSUER_ID }}
        run: scripts/sign-macos.sh
      - name: Package
        run: |
          mkdir -p dist
          tar -czvf dist/slang-macos-arm64.tar.gz -C build/bin slang
      - uses: actions/upload-artifact@v7
        with:
          name: artifact-macos
          path: dist/slang-macos-arm64.tar.gz

  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    environment: release-windows
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DSLANG_INCLUDE_TESTS=OFF
          cmake --build build -j8
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Sign binary
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\build\bin
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path build/bin/slang.exe -DestinationPath dist/slang-windows-x86_64.zip
      - uses: actions/upload-artifact@v7
        with:
          name: artifact-windows
          path: dist/slang-windows-x86_64.zip

  upload:
    name: Draft release
    needs: [linux, macos, windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: artifact-*
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            dist/slang-linux-x86_64.tar.gz
            dist/slang-macos-arm64.tar.gz
            dist/slang-windows-x86_64.zip
